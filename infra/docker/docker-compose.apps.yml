services:
  aletheia-api:
    build: ../../apps/api
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_URL=postgresql://aletheia:aletheia@postgres:5432/aletheia
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_INDEX=aletheia_chunks
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=aletheia_chunks
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  aletheia-bridge:
    build: ../../apps/bridge
    environment:
      - ALETHEIA_API_BASE=http://aletheia-api:8080
      - ALETHEIA_BRIDGE_TOKEN=change-me
      - ALETHEIA_BRIDGE_RATE_LIMIT_PER_MIN=60
      - ALETHEIA_BRIDGE_TIMEOUT=30
    ports:
      - "8090:8090"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      aletheia-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  aletheia-mcp:
    build: ../../apps/mcp_server
    environment:
      - ALETHEIA_API_BASE=http://aletheia-api:8080
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      aletheia-api:
        condition: service_healthy
    restart: unless-stopped
