services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aletheia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aletheia}
      POSTGRES_DB: ${POSTGRES_DB:-aletheia}
    volumes:
      - aletheia_postgres_data:/var/lib/postgresql/data
    ports:
      - "40001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aletheia} -d ${POSTGRES_DB:-aletheia}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - aletheia_redis_data:/data
    ports:
      - "40002:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-TempStrongPassw0rd!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - aletheia_opensearch_data:/usr/share/opensearch/data
    ports:
      - "40003:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - aletheia_qdrant_data:/qdrant/storage
    ports:
      - "40004:6333"
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-minioadmin}
      SECRET_KEY: ${RUSTFS_SECRET_KEY:-minioadmin}
      ENABLE_CONSOLE: "true"
    volumes:
      - aletheia_rustfs_data:/data
    ports:
      - "40005:9000"
      - "40006:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aletheia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aletheia}
      POSTGRES_DB: ${POSTGRES_DB:-aletheia}
    volumes:
      - ./schemas:/schemas:ro
    command: >
      sh -lc "PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /schemas/metadata.sql"
    restart: "no"

  aletheia-api:
    build:
      context: ./apps/api
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_URL: postgresql://${POSTGRES_USER:-aletheia}:${POSTGRES_PASSWORD:-aletheia}@postgres:5432/${POSTGRES_DB:-aletheia}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-aletheia_chunks}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-aletheia_chunks}
      REDIS_URL: redis://redis:6379/0
      SEARCH_CACHE_TTL: ${SEARCH_CACHE_TTL:-300}
      ASK_CACHE_TTL: ${ASK_CACHE_TTL:-180}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_PREFIX: ${CACHE_PREFIX:-aletheia}
      RETRIEVAL_BM25_WEIGHT: ${RETRIEVAL_BM25_WEIGHT:-0.65}
      RETRIEVAL_VECTOR_WEIGHT: ${RETRIEVAL_VECTOR_WEIGHT:-0.35}
      ALETHEIA_QUEUE: ${ALETHEIA_QUEUE:-aletheia_ingest}
    depends_on:
      migrate:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "40007:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  aletheia-bridge:
    build:
      context: ./apps/bridge
    environment:
      ALETHEIA_API_BASE: http://aletheia-api:8080
      ALETHEIA_BRIDGE_TOKEN: ${ALETHEIA_BRIDGE_TOKEN:-change-me}
      ALETHEIA_BRIDGE_RATE_LIMIT_PER_MIN: ${ALETHEIA_BRIDGE_RATE_LIMIT_PER_MIN:-60}
      ALETHEIA_BRIDGE_TIMEOUT: ${ALETHEIA_BRIDGE_TIMEOUT:-30}
    depends_on:
      aletheia-api:
        condition: service_healthy
    ports:
      - "40008:8090"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  aletheia-web:
    build:
      context: ./apps/web
    ports:
      - "40009:80"
    depends_on:
      aletheia-api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped


  aletheia-worker:
    build:
      context: ./apps/worker
    environment:
      REDIS_URL: redis://redis:6379/0
      ALETHEIA_QUEUE: ${ALETHEIA_QUEUE:-aletheia_ingest}
    depends_on:
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  aletheia_postgres_data:
  aletheia_redis_data:
  aletheia_opensearch_data:
  aletheia_qdrant_data:
  aletheia_rustfs_data:
