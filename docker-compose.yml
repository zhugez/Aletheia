services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aletheia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aletheia}
      POSTGRES_DB: ${POSTGRES_DB:-aletheia}
    volumes:
      - aletheia_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aletheia} -d ${POSTGRES_DB:-aletheia}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - aletheia_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-TempStrongPassw0rd!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - aletheia_opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - aletheia_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6333/collections', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - aletheia_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aletheia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aletheia}
      POSTGRES_DB: ${POSTGRES_DB:-aletheia}
    volumes:
      - ./schemas:/schemas:ro
    command: >
      sh -lc "psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /schemas/metadata.sql"
    restart: "no"

  aletheia-api:
    build:
      context: ./apps/api
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_URL: postgresql://${POSTGRES_USER:-aletheia}:${POSTGRES_PASSWORD:-aletheia}@postgres:5432/${POSTGRES_DB:-aletheia}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-aletheia_chunks}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-aletheia_chunks}
    depends_on:
      migrate:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  aletheia-bridge:
    build:
      context: ./apps/bridge
    environment:
      ALETHEIA_API_BASE: http://aletheia-api:8080
      ALETHEIA_BRIDGE_TOKEN: ${ALETHEIA_BRIDGE_TOKEN:-change-me}
      ALETHEIA_BRIDGE_RATE_LIMIT_PER_MIN: ${ALETHEIA_BRIDGE_RATE_LIMIT_PER_MIN:-60}
      ALETHEIA_BRIDGE_TIMEOUT: ${ALETHEIA_BRIDGE_TIMEOUT:-30}
    depends_on:
      aletheia-api:
        condition: service_healthy
    ports:
      - "8090:8090"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  aletheia_postgres_data:
  aletheia_redis_data:
  aletheia_opensearch_data:
  aletheia_qdrant_data:
  aletheia_minio_data:
